<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="eyeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88"/>
      <stop offset="100%" style="stop-color:#00ccff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Eye Icon -->
  <g transform="translate(600, 280)">
    <!-- Outer eye shape -->
    <ellipse cx="0" cy="0" rx="120" ry="60" fill="none" stroke="url(#eyeGradient)" stroke-width="8" filter="url(#glow)"/>
    <!-- Inner eye -->
    <ellipse cx="0" cy="0" rx="80" ry="40" fill="none" stroke="url(#eyeGradient)" stroke-width="4" opacity="0.7"/>
    <!-- Pupil -->
    <circle cx="0" cy="0" r="25" fill="url(#eyeGradient)" filter="url(#glow)"/>
    <!-- Reflection -->
    <circle cx="-8" cy="-8" r="8" fill="white" opacity="0.8"/>
  </g>

  <!-- Title -->
  <text x="600" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="white">
    DO NOT BLINK
  </text>

  <!-- Subtitle -->
  <text x="600" y="480" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="500" fill="#a0a0a0">
    The Ultimate Staring Competition
  </text>

  <!-- URL -->
  <text x="600" y="580" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="400" fill="#00ccff">
    do-not-blink.com
  </text>
</svg>
